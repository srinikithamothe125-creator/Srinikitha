<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Event Planning Coordination & Monitoring</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
text-align:center;
}

section{
display:none;
padding:40px;
}

.active{
display:block;
}

.form-box{
width:350px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
background:#f59e0b;
border:none;
padding:12px;
margin-top:10px;
cursor:pointer;
width:100%;
}

.venue-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.venue-card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.venue-card:hover{
transform:scale(1.05);
transition:0.3s;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #334155;
padding:10px;
text-align:center;
}

</style>
</head>

<body>

<header>
<h1>EventSphere - Event Planning System</h1>
</header>

<!-- SIGNUP -->

<section id="signup" class="active">

<h2>Create Account</h2>

<div class="form-box">

<form id="signupForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button>Signup</button>

</form>

</div>

</section>

<!-- LOGIN -->

<section id="login">

<h2>Login</h2>

<div class="form-box">

<form id="loginForm">

<input type="email" id="loginEmail" placeholder="Email" required>

<input type="password" id="loginPassword" placeholder="Password" required>

<button>Login</button>

</form>

</div>

</section>

<!-- EVENT PLANNER -->

<section id="planner">

<h2>Plan Your Event</h2>

<div class="form-box">

<label>Your Budget (₹)</label>
<input type="number" id="budget" placeholder="Enter Budget">

<label>Number of Guests</label>
<input type="number" id="guests" placeholder="Enter Guest Count">

<label>Decoration Type</label>
<select id="decoration">

<option>Wedding Theme</option>
<option>Birthday Theme</option>
<option>Traditional Decoration</option>
<option>Corporate Setup</option>
<option>Luxury Decoration</option>

</select>

<button onclick="searchVenues()">Find Venues</button>

</div>

<div class="venue-grid" id="venueList"></div>

</section>

<!-- BOOK EVENT -->

<section id="booking">

<h2>Confirm Booking</h2>

<div class="form-box">

<form id="bookingForm">

<input type="text" id="eventName" placeholder="Event Name" required>

<input type="date" id="eventDate" required>

<button>Confirm Booking</button>

</form>

</div>

</section>

<!-- BOOKING HISTORY -->

<section id="history">

<h2>Your Bookings</h2>

<table>

<thead>
<tr>
<th>Event</th>
<th>Date</th>
<th>Venue</th>
<th>Guests</th>
<th>Decoration</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>

</table>

</section>

<script>

/* PAGE SWITCH */

function showSection(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* SIGNUP */

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault()

let user={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
password:document.getElementById("password").value
}

localStorage.setItem("user",JSON.stringify(user))

alert("Signup successful")

showSection("login")

})

/* LOGIN */

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault()

let email=document.getElementById("loginEmail").value
let password=document.getElementById("loginPassword").value

let user=JSON.parse(localStorage.getItem("user"))

if(user && user.email===email && user.password===password){

alert("Login successful")

showSection("planner")

}else{

alert("Invalid login")

}

})

/* VENUE DATA */

let venues=[

{name:"Royal Palace Hall",capacity:500,price:150000},

{name:"Grand Celebration Hall",capacity:300,price:100000},

{name:"Luxury Wedding Arena",capacity:700,price:200000},

{name:"Diamond Convention Center",capacity:1000,price:300000}

]

let selectedVenue=""

/* SEARCH VENUES */

function searchVenues(){

let budget=document.getElementById("budget").value
let guests=document.getElementById("guests").value
let decoration=document.getElementById("decoration").value

let venueList=document.getElementById("venueList")

venueList.innerHTML=""

let filtered=venues.filter(v => v.price <= budget && v.capacity >= guests)

if(filtered.length==0){

venueList.innerHTML="<p>No venues match your requirements</p>"

return

}

filtered.forEach(v=>{

let card=document.createElement("div")

card.className="venue-card"

card.innerHTML=

`

<h3>${v.name}</h3>

<p>Capacity: ${v.capacity}</p>

<p>Price: ₹${v.price}</p>

<p>Decoration: ${decoration}</p>

<button onclick="selectVenue('${v.name}',${guests},'${decoration}')">Book Venue</button>

`

venueList.appendChild(card)

})

}

/* SELECT VENUE */

let guestCount=""
let decorType=""

function selectVenue(name,guests,decoration){

selectedVenue=name
guestCount=guests
decorType=decoration

showSection("booking")

}

/* BOOK EVENT */

document.getElementById("bookingForm").addEventListener("submit",function(e){

e.preventDefault()

let booking={

event:document.getElementById("eventName").value,
date:document.getElementById("eventDate").value,
venue:selectedVenue,
guests:guestCount,
decoration:decorType

}

let bookings=JSON.parse(localStorage.getItem("bookings")) || []

bookings.push(booking)

localStorage.setItem("bookings",JSON.stringify(bookings))

alert("Booking Confirmed!")

loadBookings()

showSection("history")

})

/* LOAD BOOKINGS */

function loadBookings(){

let bookings=JSON.parse(localStorage.getItem("bookings")) || []

let table=document.getElementById("bookingTable")

table.innerHTML=""

bookings.forEach(b=>{

table.innerHTML+=`

<tr>

<td>${b.event}</td>

<td>${b.date}</td>

<td>${b.venue}</td>

<td>${b.guests}</td>

<td>${b.decoration}</td>

</tr>

`

})

}

loadBookings()

</script>

</body>
</html>
